# Ingestion job: local JSONL → S3.
#
# Run from the REPO ROOT via:
#   ./run cloud ingest
#
# Or manually:
#   HOST_DATA_ROOT=$PWD/data/dataset_finale/ingestion \
#   docker compose -f src/backend/streaming/docker-compose.yml \
#                  --env-file .env up --build
#
# env_file path is relative to THIS file's directory (src/backend/streaming/),
# so ../../../.env resolves to the repo-root .env.

services:
  stream-worker:
    build:
      context: .
      dockerfile: stream/Dockerfile
    image: ${REGISTRY:-clair-obscur}/stream:${TAG:-latest}
    command: ["python", "/app/job/ingestion_job.py"]
    env_file:
      - ${ENV_FILE:-../../../.env}
    environment:
      # Ensure region is always visible to boto3 inside the container.
      - AWS_REGION=${AWS_REGION:-eu-west-3}
      # Forward session credentials when using aws sso login / assume-role.
      # These are empty strings if not set — boto3 falls back to ~/.aws.
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    volumes:
      # Mount dataset read-only. Set HOST_DATA_ROOT to the absolute path of
      # data/dataset_finale/ingestion/ on the host (set by ./run).
      - ${HOST_DATA_ROOT}:/data/ingestion:ro
      # Mount host AWS credentials so SSO tokens / profiles work inside the container.
      - ${HOME}/.aws:/root/.aws:ro
    restart: "no"
