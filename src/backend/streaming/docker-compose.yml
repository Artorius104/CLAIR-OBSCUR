# Two profiles:
#   docker compose --profile backfill run --rm backfill
#   docker compose --profile stream up -d
#
# Both share the same .env (one-up at the project root).

x-env: &env
  env_file:
    - ${ENV_FILE:-.env}

services:
  backfill:
    profiles: ["backfill"]
    build:
      context: .
      dockerfile: backfill/Dockerfile
    image: ${REGISTRY:-clair-obscur}/backfill:${TAG:-latest}
    <<: *env
    restart: "no"

  jobmanager:
    profiles: ["stream"]
    build:
      context: .
      dockerfile: stream/Dockerfile
    image: ${REGISTRY:-clair-obscur}/stream:${TAG:-latest}
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        state.backend: rocksdb
        state.backend.incremental: true
    <<: *env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/overview"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  taskmanager:
    profiles: ["stream"]
    image: ${REGISTRY:-clair-obscur}/stream:${TAG:-latest}
    command: taskmanager
    depends_on:
      jobmanager:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        state.backend: rocksdb
        state.backend.incremental: true
    <<: *env
    restart: unless-stopped

  submitter:
    profiles: ["stream"]
    image: ${REGISTRY:-clair-obscur}/stream:${TAG:-latest}
    depends_on:
      jobmanager:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: ["/app/submit.sh && tail -f /dev/null"]
    <<: *env
    restart: on-failure
